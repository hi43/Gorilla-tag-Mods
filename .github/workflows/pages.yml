name: Publish Task Solver to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy docs/ into gh-pages/task-solver and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add /tmp/site origin/gh-pages
          cd /tmp/site
          git checkout -B gh-pages
          mkdir -p task-solver
          cp "$GITHUB_WORKSPACE/docs/index.html" task-solver/index.html
          git add task-solver
          git commit -m "Update Task Solver app" || echo "No changes to publish"
          git push origin gh-pages
