name: Configure GitHub Pages (serve main /docs)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Point Pages at main /docs (idempotent)
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"build_type":"legacy","source":{"branch":"main","path":"/docs"}}'
          echo "Pages source set to main:/docs — GitHub's built-in Pages build deploys it automatically."
