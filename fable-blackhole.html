<title>FABLE 5 — Event Horizon</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    height:100%;overflow:hidden;background:#050310;
    position:fixed;inset:0;width:100%;
    overscroll-behavior:none;
    touch-action:none;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
  }
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:crosshair;touch-action:none}
  body.shake #gl{animation:shake .5s ease-out}
  @keyframes shake{
    0%{transform:translate(0,0)} 12%{transform:translate(-14px,9px)}
    25%{transform:translate(11px,-12px)} 40%{transform:translate(-8px,-7px)}
    55%{transform:translate(9px,6px)} 70%{transform:translate(-5px,4px)}
    85%{transform:translate(3px,-3px)} 100%{transform:translate(0,0)}
  }
  /* black hole overlay: dark core + spinning accretion ring */
  #bh{
    position:fixed;
    width:100px;height:100px;
    margin:-50px 0 0 -50px;
    border-radius:50%;
    pointer-events:none;
    opacity:0;
    background:radial-gradient(circle,
      #000 0%, #000 46%,
      rgba(255,240,220,.95) 52%,
      rgba(255,140,40,.75) 58%,
      rgba(255,61,240,.35) 68%,
      transparent 76%);
    filter:drop-shadow(0 0 30px rgba(255,140,40,.7)) drop-shadow(0 0 80px rgba(255,61,240,.4));
  }
  #bh::before{
    content:"";
    position:absolute;inset:-12%;
    border-radius:50%;
    background:conic-gradient(from 0deg,
      transparent 0deg, rgba(255,220,160,.8) 40deg, transparent 90deg,
      rgba(120,220,255,.5) 160deg, transparent 220deg,
      rgba(255,61,240,.6) 300deg, transparent 360deg);
    -webkit-mask:radial-gradient(circle,transparent 44%,#000 50%,#000 62%,transparent 70%);
    mask:radial-gradient(circle,transparent 44%,#000 50%,#000 62%,transparent 70%);
    animation:spin 1.6s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){
    #bh::before{animation:none}
    body.shake #gl{animation:none}
  }
  #flash{
    position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(circle at var(--fx,50%) var(--fy,50%),rgba(255,255,255,.95),rgba(255,150,60,.45) 25%,rgba(255,61,240,.2) 45%,transparent 70%);
    opacity:0;
  }
  #flash.boom{animation:boom 1.3s ease-out}
  @keyframes boom{0%{opacity:1}100%{opacity:0}}
  @media (prefers-reduced-motion:reduce){#flash.boom{animation:none}}
  .ui{
    position:fixed;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    padding:6vh 1.5rem;pointer-events:none;text-align:center;
    font-family:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
    transition:opacity 1.8s ease;
  }
  .ui.faded{opacity:.22}
  .ui h1{
    font-size:clamp(1rem,2.6vw,1.5rem);font-weight:700;letter-spacing:.55em;color:#eee9ff;
    text-shadow:0 0 24px rgba(255,140,40,.8),0 0 60px rgba(255,61,240,.5);
    margin-bottom:.7rem;
  }
  .ui p{
    font-size:clamp(.62rem,1.6vw,.78rem);letter-spacing:.3em;text-transform:uppercase;color:#9d92c4;
  }
</style>

<canvas id="gl"></canvas>
<div id="bh"></div>
<div id="flash"></div>
<div class="ui" id="ui">
  <h1>EVENT&thinsp;HORIZON</h1>
  <p id="hint">hold to open a black hole · release to detonate</p>
</div>

<script>
(function(){
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var isTouch = matchMedia('(pointer: coarse)').matches;
  if (isTouch) document.getElementById('hint').textContent = 'touch & hold to open a black hole · let go to detonate';
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  var cv = document.getElementById('gl');
  var gl = cv.getContext('webgl', {antialias:false, alpha:false, powerPreference:'high-performance'});
  if (!gl){ document.getElementById('ui').innerHTML = '<h1>WEBGL REQUIRED</h1>'; return; }

  var VS = [
    'attribute vec4 a_p;', // radius, angle0, angularSpeed, size
    'attribute vec4 a_s;', // z-offset, warmMix, phase, brightness
    'uniform float u_t;',
    'uniform vec2  u_mouse;',
    'uniform vec3  u_bh;',   // x, y (NDC), strength 0..1
    'uniform vec3  u_boom;', // x, y (NDC), release time
    'uniform float u_aspect;',
    'uniform float u_dpr;',
    'varying vec3 v_color;',
    'varying float v_glow;',
    'varying float v_fade;',
    'void main(){',
    '  float r = a_p.x;',
    '  float theta = a_p.y + u_t * a_p.z / (0.35 + r) + r * 3.1;',
    '  vec3 pos = vec3(cos(theta)*r, sin(theta)*r, a_s.x*(0.28 - r*0.12));',
    '  pos.z += 0.018*sin(u_t*0.8 + a_s.z);',
    /* camera: slow spin + tilt */
    '  float cs = cos(u_t*0.055), sn = sin(u_t*0.055);',
    '  pos = vec3(cs*pos.x + sn*pos.z, pos.y, -sn*pos.x + cs*pos.z);',
    '  float tc = cos(1.02), ts = sin(1.02);',
    '  pos = vec3(pos.x, tc*pos.y - ts*pos.z, ts*pos.y + tc*pos.z);',
    '  float z = pos.z + 2.3;',
    '  vec2 ndc = pos.xy / z * 1.55;',
    '  ndc.x /= u_aspect;',
    '  v_glow = 0.0;',
    '  v_fade = 1.0;',
    /* gentle mouse gravity when idle */
    '  vec2 dmm = u_mouse - ndc;',
    '  ndc += dmm * 0.22 * exp(-dot(dmm,dmm)*7.0) * (1.0 - u_bh.z);',
    /* ---- BLACK HOLE ---- */
    '  float s = u_bh.z;',
    '  if (s > 0.003){',
    '    vec2 dm = u_bh.xy - ndc;',
    '    float d = length(dm) + 0.0001;',
    '    vec2 dir = dm / d;',
    '    vec2 perp = vec2(-dir.y, dir.x);',
    /* spiral infall: radial pull + tangential swirl, stronger near the hole */
    '    float pull = s * exp(-d*d*2.2);',
    '    ndc += dir * pull * (0.5 + 0.5*s);',
    '    ndc += perp * pull * 0.75 * sin(u_t*0.9 + a_s.z);',
    /* recompute distance after displacement */
    '    vec2 dm2 = u_bh.xy - ndc;',
    '    float d2 = length(dm2);',
    '    float horizon = 0.035 + 0.095*s;',
    /* stars inside the horizon are consumed */
    '    v_fade = smoothstep(horizon, horizon*1.7, d2);',
    /* accretion heat: stars ignite as they circle the drain */
    '    v_glow += s * 3.0 * exp(-pow((d2 - horizon*2.0)*10.0, 2.0));',
    '  }',
    /* ---- DETONATION ---- */
    '  float bt = u_t - u_boom.z;',
    '  if (bt > 0.0 && bt < 3.5){',
    '    vec2 db = ndc - u_boom.xy;',
    '    float dd = length(db) + 0.0001;',
    '    float wave = bt * 1.05;',
    '    float g = exp(-pow((dd - wave)*4.5, 2.0));',
    '    float decay = 1.0 - bt/3.5;',
    '    ndc += (db/dd) * g * 0.5 * decay;',
    '    v_glow += g * 3.5 * decay;',
    '  }',
    '  gl_Position = vec4(ndc, 0.0, 1.0);',
    '  gl_PointSize = max(a_p.w * (2.4/z) * u_dpr, 1.0);',
    /* color: white core -> cyan -> magenta -> solar rim */
    '  vec3 cCyan = vec3(0.31,0.88,1.0);',
    '  vec3 cMag  = vec3(1.0,0.24,0.94);',
    '  vec3 cSol  = vec3(1.0,0.69,0.18);',
    '  vec3 col = mix(cCyan, cMag, smoothstep(0.05,0.7,r));',
    '  col = mix(col, cSol, smoothstep(0.55,1.25,r)*a_s.y);',
    '  col = mix(vec3(1.0,0.98,0.92), col, smoothstep(0.02,0.3,r));',
    /* accreting stars shift white-hot */
    '  col = mix(col, vec3(1.0,0.95,0.85), clamp(v_glow*0.35, 0.0, 1.0));',
    '  v_color = col * a_s.w;',
    '}'
  ].join('\n');

  var FS = [
    'precision mediump float;',
    'varying vec3 v_color;',
    'varying float v_glow;',
    'varying float v_fade;',
    'void main(){',
    '  vec2 uv = gl_PointCoord - 0.5;',
    '  float a = smoothstep(0.5, 0.0, length(uv));',
    '  a *= a;',
    '  gl_FragColor = vec4(v_color * (1.0 + v_glow*2.5), a * v_fade);',
    '}'
  ].join('\n');

  function shader(type, src){
    var s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw gl.getShaderInfoLog(s);
    return s;
  }
  var prog = gl.createProgram();
  gl.attachShader(prog, shader(gl.VERTEX_SHADER, VS));
  gl.attachShader(prog, shader(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw gl.getProgramInfoLog(prog);
  gl.useProgram(prog);

  /* ---- build the galaxy ---- */
  /* phones get a lighter star field so it stays at 60fps */
  var small = Math.min(screen.width, screen.height) < 600;
  var N = small ? 55000 : 120000;
  var GLOW = 500;
  var TOTAL = N + GLOW;
  var ARMS = 3;
  var P = new Float32Array(TOTAL*4);
  var S = new Float32Array(TOTAL*4);
  function gauss(){ var a=Math.random(),b=Math.random(); return Math.sqrt(-2*Math.log(a+1e-9))*Math.cos(6.2831853*b); }
  for (var i=0;i<N;i++){
    var r = Math.pow(Math.random(), 0.6) * 1.35 + 0.015;
    var arm = (i % ARMS) * (Math.PI*2/ARMS);
    var spread = 0.16 + r*0.1;
    P[i*4  ] = r;
    P[i*4+1] = arm + gauss()*spread + Math.random()*0.12;
    P[i*4+2] = 0.5 + Math.random()*0.35;
    P[i*4+3] = 0.9 + Math.pow(Math.random(),3)*2.6;
    S[i*4  ] = gauss()*0.5;
    S[i*4+1] = Math.random();
    S[i*4+2] = Math.random()*6.2831853;
    S[i*4+3] = 0.35 + Math.pow(Math.random(),2)*0.9;
  }
  for (var g=N;g<TOTAL;g++){
    var gr = Math.pow(Math.random(),2)*0.5 + 0.02;
    P[g*4  ] = gr;
    P[g*4+1] = Math.random()*6.2831853;
    P[g*4+2] = 0.3 + Math.random()*0.2;
    P[g*4+3] = 26 + Math.random()*60;
    S[g*4  ] = gauss()*0.35;
    S[g*4+1] = 0.15;
    S[g*4+2] = Math.random()*6.2831853;
    S[g*4+3] = 0.045;
  }
  function attach(name, data){
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, name);
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 4, gl.FLOAT, false, 0, 0);
  }
  attach('a_p', P);
  attach('a_s', S);

  var U = {};
  ['u_t','u_mouse','u_bh','u_boom','u_aspect','u_dpr'].forEach(function(n){ U[n] = gl.getUniformLocation(prog, n); });

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
  gl.clearColor(0.02, 0.012, 0.055, 1);

  var dpr = Math.min(devicePixelRatio || 1, 2);
  function size(){
    cv.width = innerWidth * dpr;
    cv.height = innerHeight * dpr;
    gl.viewport(0, 0, cv.width, cv.height);
    gl.uniform1f(U.u_aspect, innerWidth/innerHeight);
    gl.uniform1f(U.u_dpr, dpr);
  }
  size();
  addEventListener('resize', size);

  /* ---- input ---- */
  var mouse = [10, 10];
  var px = innerWidth/2, py = innerHeight/2;
  function toNDC(x, y){ return [(x/innerWidth)*2-1, -((y/innerHeight)*2-1)]; }
  addEventListener('pointermove', function(e){
    px = e.clientX; py = e.clientY;
    mouse = toNDC(px, py);
  });
  addEventListener('pointerleave', function(){ mouse = [10,10]; });

  var held = false;
  var strength = 0;
  var boomT = -1000, boomPos = [0,0];
  var flash = document.getElementById('flash');
  var bhEl = document.getElementById('bh');

  /* ---- synthesized audio (created on first gesture) ---- */
  var AC = null, rumbleGain = null, noiseBuf = null;
  function ensureAudio(){
    if (AC) return;
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      noiseBuf = AC.createBuffer(1, AC.sampleRate*2, AC.sampleRate);
      var d = noiseBuf.getChannelData(0), last = 0;
      for (var i=0;i<d.length;i++){ var w = Math.random()*2-1; last = (last + 0.02*w)/1.02; d[i] = last*3.5; }
      var src = AC.createBufferSource();
      src.buffer = noiseBuf; src.loop = true;
      var lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 110;
      rumbleGain = AC.createGain(); rumbleGain.gain.value = 0;
      src.connect(lp); lp.connect(rumbleGain); rumbleGain.connect(AC.destination);
      src.start();
    } catch(e){ AC = null; }
  }
  function boomSound(){
    if (!AC) return;
    try {
      var t = AC.currentTime;
      var o = AC.createOscillator(); o.type='sine';
      o.frequency.setValueAtTime(75, t);
      o.frequency.exponentialRampToValueAtTime(28, t+1.3);
      var og = AC.createGain();
      og.gain.setValueAtTime(0.55, t);
      og.gain.exponentialRampToValueAtTime(0.001, t+1.5);
      o.connect(og); og.connect(AC.destination);
      o.start(t); o.stop(t+1.6);
      var nb = AC.createBufferSource(); nb.buffer = noiseBuf;
      var hp = AC.createBiquadFilter(); hp.type='lowpass'; hp.frequency.value = 450;
      var ng = AC.createGain();
      ng.gain.setValueAtTime(0.45, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t+1.0);
      nb.connect(hp); hp.connect(ng); ng.connect(AC.destination);
      nb.start(t); nb.stop(t+1.1);
    } catch(e){}
  }

  addEventListener('pointerdown', function(e){
    e.preventDefault();
    px = e.clientX; py = e.clientY;
    mouse = toNDC(px, py);
    held = true;
    ensureAudio();
    if (AC && AC.state === 'suspended') AC.resume();
  });
  function release(){
    if (!held) return;
    held = false;
    if (strength > 0.08){
      boomT = tNow;
      boomPos = toNDC(px, py);
      flash.style.setProperty('--fx', (px/innerWidth*100)+'%');
      flash.style.setProperty('--fy', (py/innerHeight*100)+'%');
      flash.classList.remove('boom'); void flash.offsetWidth; flash.classList.add('boom');
      document.body.classList.remove('shake'); void document.body.offsetWidth; document.body.classList.add('shake');
      boomSound();
    }
  }
  addEventListener('pointerup', release);
  addEventListener('pointercancel', release);

  setTimeout(function(){ document.getElementById('ui').classList.add('faded'); }, 6000);

  var t0 = null, tNow = 0, lastTs = 0;
  function draw(ts){
    if (t0 === null){ t0 = ts; lastTs = ts; }
    var dt = Math.min(0.05, (ts - lastTs)/1000); lastTs = ts;
    tNow = (ts - t0)/1000;

    /* black hole grows while held (~2.5s to full), collapses fast on release */
    var target = held ? 1 : 0;
    strength += (target - strength) * (held ? dt*1.6 : dt*9);
    if (strength < 0.002) strength = 0;

    /* overlay disk */
    if (strength > 0.02){
      var horizonNDC = 0.035 + 0.095*strength;
      var diamPx = horizonNDC * innerHeight * 2.4;
      bhEl.style.opacity = Math.min(1, strength*2.2);
      bhEl.style.left = px + 'px';
      bhEl.style.top = py + 'px';
      bhEl.style.transform = 'scale(' + (diamPx/100) + ')';
    } else {
      bhEl.style.opacity = 0;
    }
    if (rumbleGain) rumbleGain.gain.value = strength * 0.4;

    var bhNDC = toNDC(px, py);
    gl.uniform1f(U.u_t, tNow);
    gl.uniform2f(U.u_mouse, mouse[0], mouse[1]);
    gl.uniform3f(U.u_bh, bhNDC[0], bhNDC[1], strength);
    gl.uniform3f(U.u_boom, boomPos[0], boomPos[1], boomT);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.drawArrays(gl.POINTS, 0, TOTAL);
    if (!reduced) requestAnimationFrame(draw);
  }
  if (reduced){ draw(8000); } else { requestAnimationFrame(draw); }
})();
</script>
