<title>FABLE 5 — Event Horizon</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    height:100%;overflow:hidden;background:#050310;
    position:fixed;inset:0;width:100%;
    overscroll-behavior:none;
    touch-action:none;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
  }
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:crosshair;touch-action:none}
  body.shake #gl{animation:shake .5s ease-out}
  body.shake-mega #gl{animation:shakeMega .9s ease-out}
  @keyframes shake{
    0%{transform:translate(0,0)} 12%{transform:translate(-14px,9px)}
    25%{transform:translate(11px,-12px)} 40%{transform:translate(-8px,-7px)}
    55%{transform:translate(9px,6px)} 70%{transform:translate(-5px,4px)}
    85%{transform:translate(3px,-3px)} 100%{transform:translate(0,0)}
  }
  @keyframes shakeMega{
    0%{transform:translate(0,0) scale(1.03)} 10%{transform:translate(-26px,16px)}
    22%{transform:translate(22px,-20px)} 34%{transform:translate(-18px,-13px)}
    46%{transform:translate(17px,12px)} 58%{transform:translate(-12px,9px)}
    70%{transform:translate(9px,-7px)} 82%{transform:translate(-5px,4px)}
    100%{transform:translate(0,0) scale(1)}
  }
  #dim{position:fixed;inset:0;pointer-events:none;background:#02010a;opacity:0}
  #flash{
    position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(circle at var(--fx,50%) var(--fy,50%),rgba(255,255,255,.95),rgba(255,150,60,.45) 25%,rgba(255,61,240,.2) 45%,transparent 70%);
    opacity:0;
  }
  #flash.boom{animation:boomA 1.3s ease-out}
  @keyframes boomA{0%{opacity:1}100%{opacity:0}}
  #hud{
    position:fixed;top:4.5vh;left:0;right:0;
    text-align:center;pointer-events:none;
    font-family:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
    font-size:clamp(.62rem,1.9vw,.85rem);
    letter-spacing:.22em;text-transform:uppercase;
    color:#4ee1ff;
    text-shadow:0 0 14px rgba(78,225,255,.7);
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
  }
  #hud .warn{color:#ffb02e;text-shadow:0 0 14px rgba(255,176,46,.8)}
  #hud .surv{color:#ff3df0;text-shadow:0 0 14px rgba(255,61,240,.8)}
  #combo{
    position:fixed;top:36vh;left:0;right:0;
    text-align:center;pointer-events:none;
    font-family:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
    font-size:clamp(1.1rem,4.6vw,2.4rem);
    font-weight:700;letter-spacing:.28em;text-transform:uppercase;
    color:#fff;
    text-shadow:0 0 30px rgba(255,140,40,.9),0 0 80px rgba(255,61,240,.6);
    opacity:0;
  }
  #combo.pop{animation:pop 1.6s cubic-bezier(.16,1,.3,1)}
  @keyframes pop{
    0%{opacity:0;transform:scale(.5)}
    12%{opacity:1;transform:scale(1.12)}
    28%{transform:scale(1)}
    75%{opacity:1}
    100%{opacity:0;transform:scale(1.04)}
  }
  #controls{
    position:fixed;right:3.5vw;bottom:3.5vh;
    display:flex;gap:.55rem;z-index:6;
  }
  #controls button{
    pointer-events:auto;cursor:pointer;
    font-family:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
    font-size:clamp(.6rem,1.8vw,.78rem);
    letter-spacing:.18em;text-transform:uppercase;
    color:#9d92c4;
    background:rgba(23,16,48,.72);
    border:1px solid #2b2150;
    border-radius:4px;
    padding:.55em 1em;
  }
  #controls button.on{color:#ff3df0;border-color:#ff3df0;text-shadow:0 0 10px rgba(255,61,240,.7)}
  .ui{
    position:fixed;inset:auto 0 3.5vh 0;
    display:flex;flex-direction:column;align-items:center;
    padding:0 1.5rem;pointer-events:none;text-align:center;
    font-family:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
    transition:opacity 1.8s ease;
  }
  .ui.faded{opacity:.22}
  .ui h1{
    font-size:clamp(.95rem,2.4vw,1.4rem);font-weight:700;letter-spacing:.55em;color:#eee9ff;
    text-shadow:0 0 24px rgba(255,140,40,.8),0 0 60px rgba(255,61,240,.5);
    margin-bottom:.6rem;
  }
  .ui p{
    font-size:clamp(.58rem,1.55vw,.74rem);letter-spacing:.24em;text-transform:uppercase;color:#9d92c4;
    max-width:92vw;
  }
  @media (prefers-reduced-motion:reduce){
    body.shake #gl,body.shake-mega #gl{animation:none}
    #flash.boom{animation:none}
    #combo.pop{animation:none;opacity:1}
  }
</style>

<canvas id="gl"></canvas>
<div id="dim"></div>
<div id="flash"></div>
<div id="hud">SCORE 0</div>
<div id="combo"></div>
<div id="controls">
  <button id="skinBtn" type="button">🎨 plasma</button>
  <button id="warpBtn" type="button">⏱ 1×</button>
  <button id="survBtn" type="button">⚔ survival</button>
  <button id="cardBtn" type="button" style="display:none">💾 score card</button>
</div>
<div class="ui" id="ui">
  <h1>EVENT&thinsp;HORIZON</h1>
  <p id="hint">hold = black hole · hold longer = supermassive + jets · swipe = star cannon · double-tap = white hole</p>
</div>

<script>
(function(){
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var isTouch = matchMedia('(pointer: coarse)').matches;
  if (isTouch) document.getElementById('hint').textContent =
    'hold = black hole · two fingers = two holes (merge them!) · swipe = star cannon · double-tap = white hole · tilt to look around';
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  var cv = document.getElementById('gl');
  var gl = cv.getContext('webgl', {antialias:false, alpha:false, depth:false, powerPreference:'high-performance'});
  if (!gl){ document.getElementById('ui').innerHTML = '<h1>WEBGL REQUIRED</h1>'; return; }

  /* =============== SHADERS =============== */
  var STAR_VS = [
    'attribute vec4 a_p;', // galaxy: radius, angle0, angularSpeed, size | ember: -1, idx, rand, baseSize
    'attribute vec4 a_s;', // z-offset, typeMix, phase, brightness
    'uniform float u_t;',
    'uniform vec2  u_mouse;',
    'uniform vec2  u_cam;',
    'uniform vec3  u_bh0;',
    'uniform vec3  u_bh1;',
    'uniform vec3  u_wh;',   // white hole: ndc x, y, strength
    'uniform vec3  u_neut;', // neutron star: ndc x, y, strength
    'uniform vec4  u_boom;', // ndc x, y, sim time, power
    'uniform float u_aspect;',
    'uniform float u_dpr;',
    'uniform vec3 u_c1;',    // skin palette
    'uniform vec3 u_c2;',
    'uniform vec3 u_c3;',
    'varying vec3 v_color;',
    'varying float v_glow;',
    'varying float v_fade;',
    'vec2 applyHole(vec2 ndc, vec3 bh, float phase, inout float fade, inout float glow){',
    '  float s = bh.z;',
    '  if (s < 0.003) return ndc;',
    '  vec2 dm = bh.xy - ndc;',
    '  float d = length(dm) + 0.0001;',
    '  vec2 dir = dm / d;',
    '  vec2 perp = vec2(-dir.y, dir.x);',
    '  float pull = min(s, 1.6) * exp(-d*d*2.2/(1.0+0.6*max(s-1.0,0.0)));',
    '  ndc += dir * pull * (0.5 + 0.5*min(s,1.0));',
    '  ndc += perp * pull * 0.75 * sin(u_t*0.9 + phase);',
    '  vec2 dm2 = bh.xy - ndc;',
    '  float d2 = length(dm2);',
    '  float horizon = 0.035 + 0.095*s;',
    '  fade = min(fade, smoothstep(horizon, horizon*1.7, d2));',
    '  glow += min(s,1.3) * 3.0 * exp(-pow((d2 - horizon*2.0)*10.0, 2.0));',
    '  return ndc;',
    '}',
    'void main(){',
    /* ---------- EMBER BRANCH: detonation debris ---------- */
    '  if (a_p.x < -0.5){',
    '    float bt = u_t - u_boom.z;',
    '    float life = 2.3;',
    '    if (bt <= 0.02 || bt >= life){',
    '      gl_Position = vec4(2.0, 2.0, 0.0, 1.0); gl_PointSize = 0.0;',
    '      v_color = vec3(0.0); v_glow = 0.0; v_fade = 0.0;',
    '      return;',
    '    }',
    '    float ang = a_p.y * 6.2831853 + a_s.x * 3.0;',
    '    float sp = (0.12 + 0.5*a_p.z) * (0.45 + 0.55*u_boom.w);',
    '    float rr = sp * bt * (1.0 - 0.22*bt);',
    '    vec2 e = u_boom.xy + vec2(cos(ang)/u_aspect, sin(ang)) * rr;',
    '    e.y -= 0.05 * bt * bt;', /* embers sink a little */
    '    gl_Position = vec4(e, 0.0, 1.0);',
    '    float flick = 0.55 + 0.45*sin(u_t*22.0 + a_s.y*50.0);',
    '    gl_PointSize = max(a_p.w * flick * u_dpr, 1.0);',
    '    v_color = mix(vec3(1.0,0.72,0.25), vec3(1.0,0.32,0.18), a_s.z) * 1.4;',
    '    v_glow = 1.6 * flick;',
    '    v_fade = 1.0 - bt/life;',
    '    return;',
    '  }',
    /* ---------- GALAXY BRANCH ---------- */
    '  float r = a_p.x;',
    '  float theta = a_p.y + u_t * a_p.z / (0.35 + r) + r * 3.1;',
    '  vec3 pos = vec3(cos(theta)*r, sin(theta)*r, a_s.x*(0.28 - r*0.12));',
    '  pos.z += 0.018*sin(u_t*0.8 + a_s.z);',
    '  float spin = u_t*0.055 + u_cam.x*0.45;',
    '  float cs = cos(spin), sn = sin(spin);',
    '  pos = vec3(cs*pos.x + sn*pos.z, pos.y, -sn*pos.x + cs*pos.z);',
    '  float tilt = 1.02 + u_cam.y*0.35;',
    '  float tc = cos(tilt), ts = sin(tilt);',
    '  pos = vec3(pos.x, tc*pos.y - ts*pos.z, ts*pos.y + tc*pos.z);',
    '  float z = pos.z + 2.3;',
    '  vec2 ndc = pos.xy / z * 1.55;',
    '  ndc.x /= u_aspect;',
    '  float glow = 0.0;',
    '  float fade = 1.0;',
    '  float sTot = u_bh0.z + u_bh1.z;',
    '  vec2 dmm = u_mouse - ndc;',
    '  ndc += dmm * 0.22 * exp(-dot(dmm,dmm)*7.0) * max(1.0 - sTot, 0.0);',
    '  ndc = applyHole(ndc, u_bh0, a_s.z, fade, glow);',
    '  ndc = applyHole(ndc, u_bh1, a_s.z + 2.1, fade, glow);',
    /* white hole: pushes stars outward and lights them up */
    '  if (u_wh.z > 0.01){',
    '    vec2 dw = ndc - u_wh.xy;',
    '    float dwl = length(dw) + 0.0001;',
    '    ndc += (dw/dwl) * u_wh.z * 0.5 * exp(-dwl*dwl*4.0);',
    '    glow += u_wh.z * 2.2 * exp(-dwl*dwl*24.0);',
    '  }',
    /* passing neutron star drags a wake of stars */
    '  if (u_neut.z > 0.01){',
    '    vec2 dn = u_neut.xy - ndc;',
    '    float dnl = length(dn) + 0.0001;',
    '    ndc += (dn/dnl) * u_neut.z * 0.35 * exp(-dnl*dnl*14.0);',
    '    glow += u_neut.z * 1.6 * exp(-dnl*dnl*40.0);',
    '  }',
    '  float bt = u_t - u_boom.z;',
    '  if (bt > 0.0 && bt < 4.0){',
    '    vec2 db = ndc - u_boom.xy;',
    '    float dd = length(db) + 0.0001;',
    '    float wave = bt * (0.85 + 0.4*u_boom.w);',
    '    float g = exp(-pow((dd - wave)*4.5, 2.0));',
    '    float decay = 1.0 - bt/4.0;',
    '    ndc += (db/dd) * g * 0.45 * u_boom.w * decay;',
    '    glow += g * 3.0 * u_boom.w * decay;',
    '  }',
    '  v_glow = glow;',
    '  v_fade = fade;',
    '  gl_Position = vec4(ndc, 0.0, 1.0);',
    '  gl_PointSize = max(a_p.w * (2.4/z) * u_dpr, 1.0);',
    /* base galaxy colors come from the active skin */
    '  vec3 col = mix(u_c1, u_c2, smoothstep(0.05,0.7,r));',
    '  col = mix(col, u_c3, smoothstep(0.55,1.25,r)*fract(a_s.y*7.31));',
    '  col = mix(vec3(1.0,0.98,0.92), col, smoothstep(0.02,0.3,r));',
    /* stellar types: red giants, blue supergiants, rare gold stars */
    '  float typ = a_s.y;',
    '  if (typ > 0.955){',
    '    if (typ > 0.995)      col = vec3(1.0, 0.84, 0.30) * 1.5;',  /* gold */
    '    else if (typ > 0.978) col = vec3(0.55, 0.75, 1.0) * 1.45;', /* blue supergiant */
    '    else                  col = vec3(1.0, 0.42, 0.22) * 1.25;', /* red giant */
    '  }',
    '  col = mix(col, vec3(1.0,0.95,0.85), clamp(glow*0.35, 0.0, 1.0));',
    '  v_color = col * a_s.w * 1.15;',
    '}'
  ].join('\n');

  var STAR_FS = [
    'precision mediump float;',
    'varying vec3 v_color;',
    'varying float v_glow;',
    'varying float v_fade;',
    'void main(){',
    '  vec2 uv = gl_PointCoord - 0.5;',
    '  float a = smoothstep(0.5, 0.0, length(uv));',
    '  a *= a;',
    '  gl_FragColor = vec4(v_color * (1.0 + v_glow*2.5), a * v_fade);',
    '}'
  ].join('\n');

  var QUAD_VS = [
    'attribute vec2 a_pos;',
    'varying vec2 v_uv;',
    'void main(){ v_uv = a_pos*0.5+0.5; gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var FADE_FS = [
    'precision mediump float;',
    'void main(){ gl_FragColor = vec4(0.0, 0.0, 0.0, 0.34); }'
  ].join('\n');

  var BLUR_FS = [
    'precision mediump float;',
    'varying vec2 v_uv;',
    'uniform sampler2D u_tex;',
    'uniform vec2 u_dir;',
    'uniform float u_thresh;',
    'vec3 tap(vec2 uv){',
    '  vec3 c = texture2D(u_tex, uv).rgb;',
    '  return u_thresh > 0.0 ? max(c - u_thresh, 0.0) * 1.7 : c;',
    '}',
    'void main(){',
    '  vec3 c = tap(v_uv) * 0.227;',
    '  c += (tap(v_uv + u_dir*1.385) + tap(v_uv - u_dir*1.385)) * 0.316;',
    '  c += (tap(v_uv + u_dir*3.231) + tap(v_uv - u_dir*3.231)) * 0.070;',
    '  gl_FragColor = vec4(c, 1.0);',
    '}'
  ].join('\n');

  var POST_FS = [
    'precision highp float;',
    'varying vec2 v_uv;',
    'uniform sampler2D u_scene;',
    'uniform sampler2D u_bloom;',
    'uniform float u_t;',
    'uniform float u_aspect;',
    'uniform vec3 u_bh0;',
    'uniform vec3 u_bh1;',
    'uniform vec3 u_wh;',      // uv x, y, strength
    'uniform vec4 u_boom;',    // uv x, y, sim time, power
    'uniform vec4 u_comet;',   // uv x, y, heat, 0
    'uniform vec2 u_cometDir;',
    'uniform vec4 u_neutP;',   // neutron star: uv x, y, heat, 0
    'uniform vec2 u_neutDir;',
    'uniform vec3 u_nebTint;',
    'float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453123); }',
    'float noise(vec2 p){',
    '  vec2 i = floor(p), f = fract(p);',
    '  f = f*f*(3.0-2.0*f);',
    '  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),',
    '             mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);',
    '}',
    'float fbm(vec2 p){',
    '  float v = 0.0, a = 0.5;',
    '  for (int i=0;i<4;i++){ v += a*noise(p); p = p*2.03 + 11.7; a *= 0.5; }',
    '  return v;',
    '}',
    'vec2 corr(vec2 uv){ return vec2(uv.x*u_aspect, uv.y); }',
    'vec2 clampUV(vec2 uv){ return clamp(uv, vec2(0.001), vec2(0.999)); }',
    'void hole(vec3 bh, inout vec2 suv, inout float dark, inout vec3 ringCol){',
    '  float s = bh.z;',
    '  if (s < 0.003) return;',
    '  vec2 hc = corr(bh.xy);',
    '  vec2 d = corr(suv) - hc;',
    '  float r = length(d) + 0.00001;',
    '  float h = (0.035 + 0.095*s) * 0.5;',
    '  float ang = 0.55 * (h*h) / (r*r + h*h*0.2);',
    '  float ca = cos(ang), sa = sin(ang);',
    '  d = mat2(ca,-sa,sa,ca) * d;',
    '  float defl = h*h*1.6 / max(r*r, h*h*0.28);',
    '  vec2 sc = hc + d * (1.0 + defl);',
    '  suv = vec2(sc.x / u_aspect, sc.y);',
    '  dark = max(dark, smoothstep(h*1.05, h*0.90, r));',
    '  float ring = exp(-pow((r - h*1.10)/(h*0.13), 2.0));',
    '  ringCol += ring * min(s,1.4) * vec3(1.0, 0.92, 0.78) * 1.5;',
    '  ringCol += exp(-pow((r - h*1.45)/(h*0.55), 2.0)) * min(s,1.4) * vec3(0.95, 0.35, 0.65) * 0.4;',
    '  ringCol += exp(-pow((r - h*2.1)/(h*1.1), 2.0)) * min(s,1.4) * vec3(0.25, 0.5, 0.9) * 0.22;',
    /* relativistic jets from the poles once supermassive */
    '  if (s > 1.05){',
    '    float j = (s - 1.05) * 1.5;',
    '    vec2 dj = corr(v_uv) - hc;',
    '    float along = abs(dj.y) - h*1.15;',
    '    if (along > 0.0){',
    '      float beam = exp(-pow(dj.x/(h*0.30*(1.0+along*2.4)), 2.0)) * exp(-along*2.6) * j;',
    '      beam *= 0.72 + 0.28*sin(u_t*9.0 - along*34.0);',
    '      ringCol += beam * vec3(0.55, 0.85, 1.0) * 1.25;',
    '    }',
    '  }',
    '}',
    'void whitehole(vec3 wh, inout vec2 suv, inout vec3 ringCol){',
    '  float s = wh.z;',
    '  if (s < 0.01) return;',
    '  vec2 hc = corr(wh.xy);',
    '  vec2 d = corr(suv) - hc;',
    '  float r = length(d) + 0.00001;',
    '  float h = (0.03 + 0.07*s) * 0.5;',
    '  float defl = h*h*1.2 / max(r*r, h*h*0.3);',
    '  vec2 sc = hc + d * (1.0 - defl*0.8);',   /* inverted lens: magnify */
    '  suv = vec2(sc.x / u_aspect, sc.y);',
    '  ringCol += exp(-pow((r - h)/(h*0.5), 2.0)) * s * vec3(0.75, 0.95, 1.0) * 1.3;',
    '  ringCol += exp(-r*r/(h*h*4.0)) * s * vec3(0.9, 1.0, 1.0) * 0.9;',
    '}',
    'void main(){',
    '  vec2 suv = v_uv;',
    '  float dark = 0.0;',
    '  vec3 ringCol = vec3(0.0);',
    '  hole(u_bh0, suv, dark, ringCol);',
    '  hole(u_bh1, suv, dark, ringCol);',
    '  whitehole(u_wh, suv, ringCol);',
    '  float bt = u_t - u_boom.z;',
    '  if (bt > 0.0 && bt < 3.2){',
    '    vec2 d = corr(v_uv) - corr(u_boom.xy);',
    '    float r = length(d) + 0.00001;',
    '    float w = bt * (0.26 + 0.13*u_boom.w);',
    '    float g = exp(-pow((r - w)/0.045, 2.0));',
    '    float decay = 1.0 - bt/3.2;',
    '    vec2 shift = (d/r) * g * 0.035 * u_boom.w * decay;',
    '    suv -= vec2(shift.x / u_aspect, shift.y);',
    '    ringCol += g * decay * u_boom.w * vec3(1.0, 0.8, 0.55) * 0.55;',
    '  }',
    /* star cannon comet: bright head + tapered tail */
    '  if (u_comet.z > 0.001){',
    '    vec2 cp = corr(u_comet.xy);',
    '    vec2 d = corr(v_uv) - cp;',
    '    float r2 = dot(d,d);',
    '    ringCol += u_comet.z * vec3(0.65, 0.9, 1.0) * exp(-r2/0.00030) * 1.6;',
    '    float along = dot(d, -u_cometDir);',
    '    float side = dot(d, vec2(-u_cometDir.y, u_cometDir.x));',
    '    if (along > 0.0 && along < 0.14){',
    '      ringCol += u_comet.z * vec3(0.4, 0.7, 1.0) * exp(-side*side/0.00014) * (1.0 - along/0.14) * 0.9;',
    '    }',
    '  }',
    /* rogue neutron star: pulsing violet-white beacon with a long wake */
    '  if (u_neutP.z > 0.001){',
    '    vec2 cp = corr(u_neutP.xy);',
    '    vec2 d = corr(v_uv) - cp;',
    '    float r2 = dot(d,d);',
    '    float pulse = 0.75 + 0.25*sin(u_t*14.0);',
    '    ringCol += u_neutP.z * pulse * vec3(0.88, 0.82, 1.0) * exp(-r2/0.00016) * 2.2;',

  function ensureAudio(){

    } catch(err){}
  }
  warpBtn.addEventListener('click', function(){
    warpIdx = (warpIdx + 1) % WARPS.length;
    warp = WARPS[warpIdx];
    warpBtn.textContent = '⏱ ' + (warp === 0.3 ? '⅓×' : warp + '×');
    warpBtn.classList.toggle('on', warp !== 1);
  });
  survBtn.addEventListener('click', function(){
    if (inSurvival){
      inSurvival = false;
      survBtn.classList.remove('on');
      survBtn.textContent = '⚔ survival';
      return;
    }
    inSurvival = true;
    survivalStart = score;
    survivalEnd = performance.now() + 60000;
    survBtn.classList.add('on');
    survBtn.textContent = '⚔ abort';
    cardBtn.style.display = 'none';
    showCombo('60 SECONDS · DESTROY');
  });

  setTimeout(function(){ document.getElementById('ui').classList.add('faded'); }, 7000);

  /* =============== RENDER LOOP =============== */
  var t0 = null, lastTs = 0, simT = 0;
  function draw(ts){
    if (t0 === null){ t0 = ts; lastTs = ts; }
    var dt = Math.min(0.05, (ts - lastTs)/1000); lastTs = ts;
    simT += dt * warp;
    var aspect = innerWidth/innerHeight;
    var realNow = performance.now();

    cam[0] += (camTarget[0] - cam[0]) * 0.06;
    cam[1] += (camTarget[1] - cam[1]) * 0.06;

    /* grow holes, detect merges */
    var act = activeHoles();
    var sTot = 0, sMax = 0;
    for (var k=0;k<act.length;k++){
      var h = act[k];
      h.s += (h.s < 1 ? dt*0.55*(1.8 - h.s) : dt*0.16);
      if (h.s > 2) h.s = 2;
      sTot += h.s; if (h.s > sMax) sMax = h.s;
      var inc = dt * 9000 * h.s * h.s;
      eaten = Math.min(N, eaten + inc);
      score += inc * 0.5;
    }
    /* binary merger */
    if (act.length === 2){
      var r0 = (0.035 + 0.095*act[0].s) * innerHeight/2;
      var r1 = (0.035 + 0.095*act[1].s) * innerHeight/2;
      if (Math.hypot(act[0].x - act[1].x, act[0].y - act[1].y) < (r0 + r1) * 0.85){
        var keep = act[0].s >= act[1].s ? act[0] : act[1];
        var lose = keep === act[0] ? act[1] : act[0];
        keep.s = Math.min(2, keep.s + lose.s * 0.85);
        lose.dead = true;
        var mx = (act[0].x + act[1].x)/2, my = (act[0].y + act[1].y)/2;
        triggerBoom(mx, my, 0.5, 'BINARY MERGER');
        score += 2500;
      }
    }
    dim.style.opacity = Math.max(0, Math.min(0.55, (sMax - 0.9) * 0.6));
    if (rumbleGain){
      rumbleGain.gain.value = Math.min(0.55, sTot * 0.35);
      rumbleLP.frequency.value = 90 + sMax * 60;
    }
    /* ambient drone darkens and detunes as holes grow */
    if (droneGain){
      droneGain.gain.value = 0.028 + Math.min(sMax, 1.6) * 0.035;
      droneLP.frequency.value = 240 + sMax * 420;
      for (var dv=0; dv<droneDetune.length; dv++){
        droneDetune[dv].detune.value = -sMax * 35 * (dv + 1);
      }
    }

    /* rogue neutron star */
    if (!neut.live && simT > nextNeut){
      var fromLeft = Math.random() < 0.5;
      neut.x = fromLeft ? -30 : innerWidth + 30;
      neut.y = innerHeight * (0.25 + Math.random() * 0.5);
      neut.vx = (fromLeft ? 1 : -1) * innerWidth / (5.5 + Math.random()*2);
      neut.vy = (Math.random() - 0.5) * innerHeight / 14;
      neut.live = true;
      flashMsg('<span class="warn">⚠ NEUTRON STAR INBOUND — CATCH IT</span>', 2600);
    }
    var neutHeat = 0;
    if (neut.live){
      neut.x += neut.vx * dt * warp;
      neut.y += neut.vy * dt * warp;
      neutHeat = 1;
      if (neut.x < -60 || neut.x > innerWidth + 60 || neut.y < -60 || neut.y > innerHeight + 60){
        neut.live = false;
        nextNeut = simT + 24 + Math.random() * 16;
      } else {
        for (var nk=0; nk<act.length; nk++){
          var hh = act[nk];
          var hr = (0.035 + 0.095*hh.s) * innerHeight/2 * 1.6;
          if (Math.hypot(hh.x - neut.x, hh.y - neut.y) < hr){
            neut.live = false;
            nextNeut = simT + 24 + Math.random() * 16;
            score += 20000;
            triggerBoom(neut.x, neut.y, 0.9, 'NEUTRON STAR DEVOURED');
            flashMsg('<span class="warn">★ +20,000 NEUTRON BONUS</span>', 2400);
            break;
          }
        }
      }
    }

    /* comet flight */
    var cometHeat = 0;
    if (comet.live){
      comet.x += comet.vx * dt * warp;
      comet.y += comet.vy * dt * warp;
      var age = simT - comet.t0;
      cometHeat = 1;
      var off = comet.x < -40 || comet.x > innerWidth+40 || comet.y < -40 || comet.y > innerHeight+40;
      if (age > 0.85 || off){
        comet.live = false;
        var bx = Math.max(6, Math.min(innerWidth-6, comet.x));
        var by = Math.max(6, Math.min(innerHeight-6, comet.y));
        triggerBoom(bx, by, 0.75, 'COMET IMPACT');
      }
    }

    /* white hole envelope */
    var wAge = simT - white.t0;
    var wS = (wAge > 0 && wAge < 4) ? Math.sin(Math.PI * wAge/4) * 0.85 : 0;

    /* survival timer */
    if (inSurvival && realNow >= survivalEnd){
      inSurvival = false;
      var survScore = Math.floor(score - survivalStart);
      survBtn.classList.remove('on');
      survBtn.textContent = '⚔ survival';
      var recordS = survScore > bestSurv;
      if (recordS){ bestSurv = survScore; try { localStorage.setItem('eh_best_surv', bestSurv); } catch(err){} }
      showCombo(recordS ? 'NEW SURVIVAL RECORD' : 'TIME UP');
      flashMsg('<span class="surv">⚔ SURVIVAL SCORE ' + fmt(survScore) + (recordS ? ' · NEW BEST' : ' · BEST ' + fmt(bestSurv)) + '</span>', 4000);
      lastSurvScore = survScore;
      cardBtn.style.display = '';
    }
    /* high score */
    if (Math.floor(score) > best){
      best = Math.floor(score);
      try { localStorage.setItem('eh_best', best); } catch(err){}
    }

    /* HUD */
    if (realNow < hudMsgUntil){
      if (hud.innerHTML !== hudMsg) hud.innerHTML = hudMsg;
    } else {
      var line = '';
      if (inSurvival) line += '<span class="surv">⚔ ' + Math.ceil((survivalEnd - realNow)/1000) + 's</span> · ';
      line += 'SCORE ' + fmt(score) + ' · BEST ' + fmt(best);
      if (act.length > 0) line += ' · <span class="warn">STARS ' + fmt(eaten) + '</span>';
      if (hud.innerHTML !== line) hud.innerHTML = line;
    }

    var n0 = act[0] ? toNDC(act[0].x, act[0].y).concat(act[0].s) : [0,0,0];
    var n1 = act[1] ? toNDC(act[1].x, act[1].y).concat(act[1].s) : [0,0,0];
    var v0 = act[0] ? toUV(act[0].x, act[0].y).concat(act[0].s) : [0,0,0];
    var v1 = act[1] ? toUV(act[1].x, act[1].y).concat(act[1].s) : [0,0,0];
    var wNDC = toNDC(white.x, white.y);
    var wUV = toUV(white.x, white.y);
    var cUV = toUV(comet.x, comet.y);
    var cd = Math.hypot(comet.vx, comet.vy) || 1;
    var cDir = [comet.vx/cd * aspect, -comet.vy/cd]; /* corrected-space direction */
    var cdn = Math.hypot(cDir[0], cDir[1]) || 1;
    cDir = [cDir[0]/cdn, cDir[1]/cdn];
    var nNDC = toNDC(neut.x, neut.y);
    var nUV = toUV(neut.x, neut.y);
    var nd = Math.hypot(neut.vx, neut.vy) || 1;
    var nDir = [neut.vx/nd * aspect, -neut.vy/nd];
    var ndn = Math.hypot(nDir[0], nDir[1]) || 1;
    nDir = [nDir[0]/ndn, nDir[1]/ndn];
    var skin = SKINS[skinIdx];

    /* pass 1: stars + trails */
    gl.bindFramebuffer(gl.FRAMEBUFFER, scene.fbo);
    gl.viewport(0, 0, scene.w, scene.h);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
    gl.useProgram(progFade);
    drawQuad();
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
    gl.useProgram(progStars);
    bindStars();
    gl.uniform1f(US.u_t, simT);
    gl.uniform2f(US.u_mouse, mouse[0], mouse[1]);
    gl.uniform2f(US.u_cam, cam[0], cam[1]);
    gl.uniform3f(US.u_bh0, n0[0], n0[1], n0[2]);
    gl.uniform3f(US.u_bh1, n1[0], n1[1], n1[2]);
    gl.uniform3f(US.u_wh, wNDC[0], wNDC[1], wS);
    gl.uniform3f(US.u_neut, nNDC[0], nNDC[1], neutHeat * 0.9);
    gl.uniform4f(US.u_boom, boomNDC[0], boomNDC[1], boomNDC[2], boomNDC[3]);
    gl.uniform1f(US.u_aspect, aspect);
    gl.uniform1f(US.u_dpr, dpr);
    gl.uniform3f(US.u_c1, skin.c1[0], skin.c1[1], skin.c1[2]);
    gl.uniform3f(US.u_c2, skin.c2[0], skin.c2[1], skin.c2[2]);
    gl.uniform3f(US.u_c3, skin.c3[0], skin.c3[1], skin.c3[2]);
    gl.drawArrays(gl.POINTS, 0, TOTAL);
    gl.disable(gl.BLEND);

    /* pass 2: bloom */
    gl.useProgram(progBlur);
    gl.uniform1i(UB.u_tex, 0);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, scene.tex);
    gl.bindFramebuffer(gl.FRAMEBUFFER, bloomA.fbo);
    gl.viewport(0, 0, bloomA.w, bloomA.h);
    gl.uniform2f(UB.u_dir, 1.4/bloomA.w, 0);
    gl.uniform1f(UB.u_thresh, 0.30);
    drawQuad();
    gl.bindTexture(gl.TEXTURE_2D, bloomA.tex);
    gl.bindFramebuffer(gl.FRAMEBUFFER, bloomB.fbo);
    gl.uniform2f(UB.u_dir, 0, 1.4/bloomA.h);
    gl.uniform1f(UB.u_thresh, 0.0);
    drawQuad();

    /* pass 3: composite */
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, cv.width, cv.height);
    gl.useProgram(progPost);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, scene.tex);
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, bloomB.tex);
    gl.activeTexture(gl.TEXTURE0);
    gl.uniform1i(UP.u_scene, 0);
    gl.uniform1i(UP.u_bloom, 1);
    gl.uniform1f(UP.u_t, simT);
    gl.uniform1f(UP.u_aspect, aspect);
    gl.uniform3f(UP.u_bh0, v0[0], v0[1], v0[2]);
    gl.uniform3f(UP.u_bh1, v1[0], v1[1], v1[2]);
    gl.uniform3f(UP.u_wh, wUV[0], wUV[1], wS);
    gl.uniform4f(UP.u_boom, boomUV[0], boomUV[1], boomUV[2], boomUV[3]);
    gl.uniform4f(UP.u_comet, cUV[0], cUV[1], cometHeat, 0);
    gl.uniform2f(UP.u_cometDir, cDir[0], cDir[1]);
    gl.uniform4f(UP.u_neutP, nUV[0], nUV[1], neutHeat, 0);
    gl.uniform2f(UP.u_neutDir, nDir[0], nDir[1]);
    gl.uniform3f(UP.u_nebTint, skin.neb[0], skin.neb[1], skin.neb[2]);
    drawQuad();

    /* score card must be captured in the same frame the buffer is drawn */
    if (wantCard){ wantCard = false; makeCard(); }

    if (!reduced) requestAnimationFrame(draw);
  }
  if (reduced){ draw(8000); } else { requestAnimationFrame(draw); }
})();
</script>
