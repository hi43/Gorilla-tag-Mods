<title>FABLE 5 — Event Horizon</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    height:100%;overflow:hidden;background:#050310;
    position:fixed;inset:0;width:100%;
    overscroll-behavior:none;
    touch-action:none;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
  }
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:crosshair;touch-action:none}
  body.shake #gl{animation:shake .5s ease-out}
  body.shake-mega #gl{animation:shakeMega .9s ease-out}
  @keyframes shake{
    0%{transform:translate(0,0)} 12%{transform:translate(-14px,9px)}
    25%{transform:translate(11px,-12px)} 40%{transform:translate(-8px,-7px)}
    55%{transform:translate(9px,6px)} 70%{transform:translate(-5px,4px)}
    85%{transform:translate(3px,-3px)} 100%{transform:translate(0,0)}
  }
  @keyframes shakeMega{
    0%{transform:translate(0,0) scale(1.03)} 10%{transform:translate(-26px,16px)}
    22%{transform:translate(22px,-20px)} 34%{transform:translate(-18px,-13px)}
    46%{transform:translate(17px,12px)} 58%{transform:translate(-12px,9px)}
    70%{transform:translate(9px,-7px)} 82%{transform:translate(-5px,4px)}
    100%{transform:translate(0,0) scale(1)}
  }
  /* black hole overlay: dark core + spinning accretion ring (cloned per finger) */
  .bh{
    position:fixed;
    width:100px;height:100px;
    margin:-50px 0 0 -50px;
    border-radius:50%;
    pointer-events:none;
    opacity:0;
    background:radial-gradient(circle,
      #000 0%, #000 46%,
      rgba(255,240,220,.95) 52%,
      rgba(255,140,40,.75) 58%,
      rgba(255,61,240,.35) 68%,
      transparent 76%);
  }
  .bh::before{
    content:"";
    position:absolute;inset:-12%;
    border-radius:50%;
    background:conic-gradient(from 0deg,
      transparent 0deg, rgba(255,220,160,.8) 40deg, transparent 90deg,
      rgba(120,220,255,.5) 160deg, transparent 220deg,
      rgba(255,61,240,.6) 300deg, transparent 360deg);
    -webkit-mask:radial-gradient(circle,transparent 44%,#000 50%,#000 62%,transparent 70%);
    mask:radial-gradient(circle,transparent 44%,#000 50%,#000 62%,transparent 70%);
    animation:spin 1.6s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  #dim{position:fixed;inset:0;pointer-events:none;background:#02010a;opacity:0}
  #flash{
    position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(circle at var(--fx,50%) var(--fy,50%),rgba(255,255,255,.95),rgba(255,150,60,.45) 25%,rgba(255,61,240,.2) 45%,transparent 70%);
    opacity:0;
  }
  #flash.boom{animation:boom 1.3s ease-out}
  @keyframes boom{0%{opacity:1}100%{opacity:0}}
  #hud{
    position:fixed;top:4.5vh;left:0;right:0;
    text-align:center;pointer-events:none;
    font-family:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
    font-size:clamp(.7rem,2vw,.9rem);
    letter-spacing:.3em;text-transform:uppercase;
    color:#4ee1ff;
    text-shadow:0 0 14px rgba(78,225,255,.7);
    font-variant-numeric:tabular-nums;
  }
  #hud .warn{color:#ffb02e;text-shadow:0 0 14px rgba(255,176,46,.8)}
  #combo{
    position:fixed;top:38vh;left:0;right:0;
    text-align:center;pointer-events:none;
    font-family:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
    font-size:clamp(1.2rem,5vw,2.6rem);
    font-weight:700;letter-spacing:.3em;text-transform:uppercase;
    color:#fff;
    text-shadow:0 0 30px rgba(255,140,40,.9),0 0 80px rgba(255,61,240,.6);
    opacity:0;
  }
  #combo.pop{animation:pop 1.6s cubic-bezier(.16,1,.3,1)}
  @keyframes pop{
    0%{opacity:0;transform:scale(.5)}
    12%{opacity:1;transform:scale(1.12)}
    28%{transform:scale(1)}
    75%{opacity:1}
    100%{opacity:0;transform:scale(1.04)}
  }
  .ui{
    position:fixed;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    padding:6vh 1.5rem;pointer-events:none;text-align:center;
    font-family:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
    transition:opacity 1.8s ease;
  }
  .ui.faded{opacity:.22}
  .ui h1{
    font-size:clamp(1rem,2.6vw,1.5rem);font-weight:700;letter-spacing:.55em;color:#eee9ff;
    text-shadow:0 0 24px rgba(255,140,40,.8),0 0 60px rgba(255,61,240,.5);
    margin-bottom:.7rem;
  }
  .ui p{
    font-size:clamp(.62rem,1.6vw,.78rem);letter-spacing:.3em;text-transform:uppercase;color:#9d92c4;
  }
  @media (prefers-reduced-motion:reduce){
    .bh::before{animation:none}
    body.shake #gl,body.shake-mega #gl{animation:none}
    #flash.boom{animation:none}
    #combo.pop{animation:none;opacity:1}
  }
</style>

<canvas id="gl"></canvas>
<div id="dim"></div>
<div id="flash"></div>
<div id="hud">STARS CONSUMED <span id="count">0</span></div>
<div id="combo"></div>
<div class="ui" id="ui">
  <h1>EVENT&thinsp;HORIZON</h1>
  <p id="hint">hold to open a black hole · keep holding to go supermassive · release to detonate</p>
</div>

<script>
(function(){
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var isTouch = matchMedia('(pointer: coarse)').matches;
  if (isTouch) document.getElementById('hint').textContent = 'touch & hold · keep holding to go supermassive · two fingers = two holes';
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  var cv = document.getElementById('gl');
  var gl = cv.getContext('webgl', {antialias:false, alpha:false, powerPreference:'high-performance'});
  if (!gl){ document.getElementById('ui').innerHTML = '<h1>WEBGL REQUIRED</h1>'; return; }

  var VS = [
    'attribute vec4 a_p;', // radius, angle0, angularSpeed, size
    'attribute vec4 a_s;', // z-offset, warmMix, phase, brightness
    'uniform float u_t;',
    'uniform vec2  u_mouse;',
    'uniform vec3  u_bh0;',  // x, y (NDC), strength 0..2
    'uniform vec3  u_bh1;',
    'uniform vec4  u_boom;', // x, y (NDC), release time, power
    'uniform float u_aspect;',
    'uniform float u_dpr;',
    'varying vec3 v_color;',
    'varying float v_glow;',
    'varying float v_fade;',
    'vec2 applyHole(vec2 ndc, vec3 bh, float phase, inout float fade, inout float glow){',
    '  float s = bh.z;',
    '  if (s < 0.003) return ndc;',
    '  vec2 dm = bh.xy - ndc;',
    '  float d = length(dm) + 0.0001;',
    '  vec2 dir = dm / d;',
    '  vec2 perp = vec2(-dir.y, dir.x);',
    '  float pull = min(s, 1.6) * exp(-d*d*2.2/(1.0+0.6*max(s-1.0,0.0)));',
    '  ndc += dir * pull * (0.5 + 0.5*min(s,1.0));',
    '  ndc += perp * pull * 0.75 * sin(u_t*0.9 + phase);',
    '  vec2 dm2 = bh.xy - ndc;',
    '  float d2 = length(dm2);',
    '  float horizon = 0.035 + 0.095*s;',
    '  fade = min(fade, smoothstep(horizon, horizon*1.7, d2));',
    '  glow += min(s,1.3) * 3.0 * exp(-pow((d2 - horizon*2.0)*10.0, 2.0));',
    '  return ndc;',
    '}',
    'void main(){',
    '  float r = a_p.x;',
    '  float theta = a_p.y + u_t * a_p.z / (0.35 + r) + r * 3.1;',
    '  vec3 pos = vec3(cos(theta)*r, sin(theta)*r, a_s.x*(0.28 - r*0.12));',
    '  pos.z += 0.018*sin(u_t*0.8 + a_s.z);',
    /* camera: slow spin + tilt */
    '  float cs = cos(u_t*0.055), sn = sin(u_t*0.055);',
    '  pos = vec3(cs*pos.x + sn*pos.z, pos.y, -sn*pos.x + cs*pos.z);',
    '  float tc = cos(1.02), ts = sin(1.02);',
    '  pos = vec3(pos.x, tc*pos.y - ts*pos.z, ts*pos.y + tc*pos.z);',
    '  float z = pos.z + 2.3;',
    '  vec2 ndc = pos.xy / z * 1.55;',
    '  ndc.x /= u_aspect;',
    '  float glow = 0.0;',
    '  float fade = 1.0;',
    /* gentle mouse gravity when no hole is open */
    '  float sTot = u_bh0.z + u_bh1.z;',
    '  vec2 dmm = u_mouse - ndc;',
    '  ndc += dmm * 0.22 * exp(-dot(dmm,dmm)*7.0) * max(1.0 - sTot, 0.0);',
    /* ---- BLACK HOLES (up to two) ---- */
    '  ndc = applyHole(ndc, u_bh0, a_s.z, fade, glow);',
    '  ndc = applyHole(ndc, u_bh1, a_s.z + 2.1, fade, glow);',
    /* ---- DETONATION ---- */
    '  float bt = u_t - u_boom.z;',
    '  if (bt > 0.0 && bt < 4.0){',
    '    vec2 db = ndc - u_boom.xy;',
    '    float dd = length(db) + 0.0001;',
    '    float wave = bt * (0.85 + 0.4*u_boom.w);',
    '    float g = exp(-pow((dd - wave)*4.5, 2.0));',
    '    float decay = 1.0 - bt/4.0;',
    '    ndc += (db/dd) * g * 0.45 * u_boom.w * decay;',
    '    glow += g * 3.0 * u_boom.w * decay;',
    '  }',
    '  v_glow = glow;',
    '  v_fade = fade;',
    '  gl_Position = vec4(ndc, 0.0, 1.0);',
    '  gl_PointSize = max(a_p.w * (2.4/z) * u_dpr, 1.0);',
    /* color: white core -> cyan -> magenta -> solar rim */
    '  vec3 cCyan = vec3(0.31,0.88,1.0);',
    '  vec3 cMag  = vec3(1.0,0.24,0.94);',
    '  vec3 cSol  = vec3(1.0,0.69,0.18);',
    '  vec3 col = mix(cCyan, cMag, smoothstep(0.05,0.7,r));',
    '  col = mix(col, cSol, smoothstep(0.55,1.25,r)*a_s.y);',
    '  col = mix(vec3(1.0,0.98,0.92), col, smoothstep(0.02,0.3,r));',
    '  col = mix(col, vec3(1.0,0.95,0.85), clamp(glow*0.35, 0.0, 1.0));',
    '  v_color = col * a_s.w;',
    '}'
  ].join('\n');

  var FS = [
    'precision mediump float;',
    'varying vec3 v_color;',
    'varying float v_glow;',
    'varying float v_fade;',
    'void main(){',
    '  vec2 uv = gl_PointCoord - 0.5;',
    '  float a = smoothstep(0.5, 0.0, length(uv));',
    '  a *= a;',
    '  gl_FragColor = vec4(v_color * (1.0 + v_glow*2.5), a * v_fade);',
    '}'
  ].join('\n');

  function shader(type, src){
    var s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw gl.getShaderInfoLog(s);
    return s;
  }
  var prog = gl.createProgram();
  gl.attachShader(prog, shader(gl.VERTEX_SHADER, VS));
  gl.attachShader(prog, shader(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw gl.getProgramInfoLog(prog);
  gl.useProgram(prog);

  /* ---- build the galaxy ---- */
  /* phones get a lighter star field so it stays at 60fps */
  var small = Math.min(screen.width, screen.height) < 600;
  var N = small ? 55000 : 120000;
  var GLOW = 500;
  var TOTAL = N + GLOW;
  var ARMS = 3;
  var P = new Float32Array(TOTAL*4);
  var S = new Float32Array(TOTAL*4);
  function gauss(){ var a=Math.random(),b=Math.random(); return Math.sqrt(-2*Math.log(a+1e-9))*Math.cos(6.2831853*b); }
  for (var i=0;i<N;i++){
    var r = Math.pow(Math.random(), 0.6) * 1.35 + 0.015;
    var arm = (i % ARMS) * (Math.PI*2/ARMS);
    var spread = 0.16 + r*0.1;
    P[i*4  ] = r;
    P[i*4+1] = arm + gauss()*spread + Math.random()*0.12;
    P[i*4+2] = 0.5 + Math.random()*0.35;
    P[i*4+3] = 0.9 + Math.pow(Math.random(),3)*2.6;
    S[i*4  ] = gauss()*0.5;
    S[i*4+1] = Math.random();
    S[i*4+2] = Math.random()*6.2831853;
    S[i*4+3] = 0.35 + Math.pow(Math.random(),2)*0.9;
  }
  for (var g=N;g<TOTAL;g++){
    var gr = Math.pow(Math.random(),2)*0.5 + 0.02;
    P[g*4  ] = gr;
    P[g*4+1] = Math.random()*6.2831853;
    P[g*4+2] = 0.3 + Math.random()*0.2;
    P[g*4+3] = 26 + Math.random()*60;
    S[g*4  ] = gauss()*0.35;
    S[g*4+1] = 0.15;
    S[g*4+2] = Math.random()*6.2831853;
    S[g*4+3] = 0.045;
  }
  function attach(name, data){
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, name);
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 4, gl.FLOAT, false, 0, 0);
  }
  attach('a_p', P);
  attach('a_s', S);

  var U = {};
  ['u_t','u_mouse','u_bh0','u_bh1','u_boom','u_aspect','u_dpr'].forEach(function(n){ U[n] = gl.getUniformLocation(prog, n); });

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
  gl.clearColor(0.02, 0.012, 0.055, 1);

  var dpr = Math.min(devicePixelRatio || 1, 2);
  function size(){
    cv.width = innerWidth * dpr;
    cv.height = innerHeight * dpr;
    gl.viewport(0, 0, cv.width, cv.height);
    gl.uniform1f(U.u_aspect, innerWidth/innerHeight);
    gl.uniform1f(U.u_dpr, dpr);
  }
  size();
  addEventListener('resize', size);

  /* ---- input: up to two simultaneous black holes ---- */
  function toNDC(x, y){ return [(x/innerWidth)*2-1, -((y/innerHeight)*2-1)]; }
  var mouse = [10, 10];
  var holes = {};            /* pointerId -> {x, y, s, el} */
  function holeCount(){ return Object.keys(holes).length; }

  var boom = [0, 0, -1000, 1];
  var eaten = 0;
  var flash = document.getElementById('flash');
  var dim = document.getElementById('dim');
  var hud = document.getElementById('hud');
  var countEl = document.getElementById('count');
  var combo = document.getElementById('combo');
  function fmt(n){ return Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,','); }

  /* ---- synthesized audio (created on first gesture) ---- */
  var AC = null, rumbleGain = null, rumbleLP = null, noiseBuf = null;
  function ensureAudio(){
    if (AC) return;
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      noiseBuf = AC.createBuffer(1, AC.sampleRate*2, AC.sampleRate);
      var d = noiseBuf.getChannelData(0), last = 0;
      for (var i=0;i<d.length;i++){ var w = Math.random()*2-1; last = (last + 0.02*w)/1.02; d[i] = last*3.5; }
      var src = AC.createBufferSource();
      src.buffer = noiseBuf; src.loop = true;
      rumbleLP = AC.createBiquadFilter(); rumbleLP.type='lowpass'; rumbleLP.frequency.value = 90;
      rumbleGain = AC.createGain(); rumbleGain.gain.value = 0;
      src.connect(rumbleLP); rumbleLP.connect(rumbleGain); rumbleGain.connect(AC.destination);
      src.start();
    } catch(e){ AC = null; }
  }
  function boomSound(power){
    if (!AC) return;
    try {
      var t = AC.currentTime;
      var o = AC.createOscillator(); o.type='sine';
      o.frequency.setValueAtTime(60 + 20/power, t);
      o.frequency.exponentialRampToValueAtTime(24, t + 1.0 + power*0.6);
      var og = AC.createGain();
      og.gain.setValueAtTime(Math.min(0.75, 0.4*power + 0.2), t);
      og.gain.exponentialRampToValueAtTime(0.001, t + 1.2 + power*0.6);
      o.connect(og); og.connect(AC.destination);
      o.start(t); o.stop(t + 1.3 + power*0.6);
      var nb = AC.createBufferSource(); nb.buffer = noiseBuf;
      var hp = AC.createBiquadFilter(); hp.type='lowpass'; hp.frequency.value = 350 + power*250;
      var ng = AC.createGain();
      ng.gain.setValueAtTime(Math.min(0.6, 0.3*power + 0.15), t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.8 + power*0.4);
      nb.connect(hp); hp.connect(ng); ng.connect(AC.destination);
      nb.start(t); nb.stop(t + 0.9 + power*0.4);
    } catch(e){}
  }

  function makeBHEl(){
    var el = document.createElement('div');
    el.className = 'bh';
    document.body.appendChild(el);
    return el;
  }

  addEventListener('pointerdown', function(e){
    e.preventDefault();
    mouse = toNDC(e.clientX, e.clientY);
    if (holeCount() >= 2) return;
    holes[e.pointerId] = { x: e.clientX, y: e.clientY, s: 0, el: makeBHEl() };
    ensureAudio();
    if (AC && AC.state === 'suspended') AC.resume();
  });
  addEventListener('pointermove', function(e){
    mouse = toNDC(e.clientX, e.clientY);
    var h = holes[e.pointerId];
    if (h){ h.x = e.clientX; h.y = e.clientY; }
  });
  addEventListener('pointerleave', function(){ mouse = [10,10]; });

  function rankFor(power){
    if (power >= 1.7) return 'GALAXY BREAKER';
    if (power >= 1.15) return 'SUPERMASSIVE COLLAPSE';
    if (power >= 0.6) return 'STELLAR DETONATION';
    return 'SHOCKWAVE';
  }
  function release(e){
    var h = holes[e.pointerId];
    if (!h) return;
    delete holes[e.pointerId];
    h.el.remove();
    if (h.s > 0.08){
      var ndc = toNDC(h.x, h.y);
      boom = [ndc[0], ndc[1], tNow, Math.min(h.s, 2)];
      flash.style.setProperty('--fx', (h.x/innerWidth*100)+'%');
      flash.style.setProperty('--fy', (h.y/innerHeight*100)+'%');
      flash.classList.remove('boom'); void flash.offsetWidth; flash.classList.add('boom');
      var mega = h.s > 1.15;
      document.body.classList.remove('shake','shake-mega'); void document.body.offsetWidth;
      document.body.classList.add(mega ? 'shake-mega' : 'shake');
      boomSound(h.s);
      combo.textContent = rankFor(h.s);
      combo.classList.remove('pop'); void combo.offsetWidth; combo.classList.add('pop');
      var released = holeCount() === 0 ? eaten : eaten * 0.5;
      hud.innerHTML = '<span class="warn">★ ' + fmt(released) + ' STARS RELEASED</span>';
      eaten = holeCount() === 0 ? 0 : eaten * 0.5;
      setTimeout(function(){ hud.innerHTML = 'STARS CONSUMED <span id="count">' + fmt(eaten) + '</span>'; countEl = document.getElementById('count'); }, 1900);
    }
  }
  addEventListener('pointerup', release);
  addEventListener('pointercancel', release);

  setTimeout(function(){ document.getElementById('ui').classList.add('faded'); }, 6000);

  var t0 = null, tNow = 0, lastTs = 0;
  function draw(ts){
    if (t0 === null){ t0 = ts; lastTs = ts; }
    var dt = Math.min(0.05, (ts - lastTs)/1000); lastTs = ts;
    tNow = (ts - t0)/1000;

    /* grow held holes: ~2.5s to full, then slow supermassive creep to 2x */
    var list = [];
    var sTot = 0, sMax = 0;
    for (var id in holes){
      var h = holes[id];
      h.s += (h.s < 1 ? dt*0.55*(1.8 - h.s) : dt*0.16) ;
      if (h.s > 2) h.s = 2;
      sTot += h.s; if (h.s > sMax) sMax = h.s;
      eaten = Math.min(N, eaten + dt * 9000 * h.s * h.s);
      /* overlay disk: size, opacity, hue shift as it grows */
      var horizonNDC = 0.035 + 0.095*h.s;
      var diamPx = horizonNDC * innerHeight * 2.4;
      h.el.style.opacity = Math.min(1, h.s*2.2);
      h.el.style.left = h.x + 'px';
      h.el.style.top = h.y + 'px';
      h.el.style.transform = 'scale(' + (diamPx/100) + ')';
      h.el.style.filter =
        'hue-rotate(' + (Math.max(h.s-1,0)*140) + 'deg)' +
        ' drop-shadow(0 0 30px rgba(255,140,40,.7)) drop-shadow(0 0 80px rgba(255,61,240,.4))';
      list.push([h.x, h.y, h.s]);
    }
    /* supermassive holes dim the rest of the universe */
    dim.style.opacity = Math.max(0, Math.min(0.55, (sMax - 0.9) * 0.6));
    if (rumbleGain){
      rumbleGain.gain.value = Math.min(0.55, sTot * 0.35);
      rumbleLP.frequency.value = 90 + sMax * 60;
    }
    if (countEl && holeCount() > 0) countEl.textContent = fmt(eaten);

    var b0 = list[0] ? toNDC(list[0][0], list[0][1]).concat(list[0][2]) : [0,0,0];
    var b1 = list[1] ? toNDC(list[1][0], list[1][1]).concat(list[1][2]) : [0,0,0];
    gl.uniform1f(U.u_t, tNow);
    gl.uniform2f(U.u_mouse, mouse[0], mouse[1]);
    gl.uniform3f(U.u_bh0, b0[0], b0[1], b0[2]);
    gl.uniform3f(U.u_bh1, b1[0], b1[1], b1[2]);
    gl.uniform4f(U.u_boom, boom[0], boom[1], boom[2], boom[3]);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.drawArrays(gl.POINTS, 0, TOTAL);
    if (!reduced) requestAnimationFrame(draw);
  }
  if (reduced){ draw(8000); } else { requestAnimationFrame(draw); }
})();
</script>
